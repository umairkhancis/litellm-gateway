model_list:
  # ── Anthropic cloud ────────────────────────────────────────────────────────
  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-5-20250929
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku-4-5-20251001
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: "claude-*"
    litellm_params:
      model: "anthropic/claude-*"
      api_key: os.environ/ANTHROPIC_API_KEY

  # ── llama3.2 ───────────────────────────────────────────────────────────────
  # vLLM: start with --served-model-name llama3.2
  # llama.cpp: serves one GGUF at a time — load a llama3.2 GGUF before routing here
  - model_name: llama3.2
    litellm_params:
      model: openai/docker.io/ai/llama3.2:latest
      api_base: http://model-runner.docker.internal:12434/engines/v1
      api_key: dummy

  - model_name: llama3.2
    litellm_params:
      model: openai/llama3.2
      api_base: http://host.docker.internal:11434/v1
      api_key: dummy

  - model_name: llama3.2
    litellm_params:
      model: openai/llama3.2
      api_base: http://host.docker.internal:8080/v1
      api_key: dummy

  - model_name: llama3.2
    litellm_params:
      model: openai/llama3.2
      api_base: http://host.docker.internal:8000/v1
      api_key: dummy

  # ── qwen2.5 ────────────────────────────────────────────────────────────────
  # vLLM: start with --served-model-name qwen2.5
  # llama.cpp: load a qwen2.5 GGUF before routing here
  - model_name: qwen2.5
    litellm_params:
      model: openai/docker.io/ai/qwen2.5:latest
      api_base: http://model-runner.docker.internal:12434/engines/v1
      api_key: dummy

  - model_name: qwen2.5
    litellm_params:
      model: openai/qwen2.5:7b
      api_base: http://host.docker.internal:11434/v1
      api_key: dummy

  - model_name: qwen2.5
    litellm_params:
      model: openai/qwen2.5
      api_base: http://host.docker.internal:8080/v1
      api_key: dummy

  - model_name: qwen2.5
    litellm_params:
      model: openai/qwen2.5
      api_base: http://host.docker.internal:8000/v1
      api_key: dummy

  # ── gemma3 ────────────────────────────────────────────────────────────────
  # vLLM: start with --served-model-name gemma3
  # llama.cpp: load a gemma3 GGUF before routing here
  - model_name: gemma3
    litellm_params:
      model: openai/docker.io/ai/gemma3:latest
      api_base: http://model-runner.docker.internal:12434/engines/v1
      api_key: dummy

  - model_name: gemma3
    litellm_params:
      model: openai/gemma3:4b
      api_base: http://host.docker.internal:11434/v1
      api_key: dummy

  - model_name: gemma3
    litellm_params:
      model: openai/gemma3
      api_base: http://host.docker.internal:8080/v1
      api_key: dummy

  - model_name: gemma3
    litellm_params:
      model: openai/gemma3
      api_base: http://host.docker.internal:8000/v1
      api_key: dummy

router_settings:
  enable_pre_call_checks: true
  routing_strategy: least-busy

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
  store_prompts_in_spend_logs: true

litellm_settings:
  cache: true
  cache_params:
    type: redis
    host: os.environ/REDIS_HOST
    port: os.environ/REDIS_PORT

  default_internal_user_params:
    user_role: "internal_user"
    max_budget: 5.0
    budget_duration: "30d"
    models: ["claude-haiku-4-5", "llama3.2"]

  key_generation_settings:
    personal_key_generation:
      allowed_user_roles: ["proxy_admin", "internal_user"]
