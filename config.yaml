model_list:
  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-5-20250929
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku-4-5-20251001
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: "claude-*"
    litellm_params:
      model: "anthropic/claude-*"
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: local-dmr
    litellm_params:
      model: openai/docker.io/ai/llama3.2:latest
      api_base: http://model-runner.docker.internal:12434/engines/v1
      api_key: dummy

guardrails:
  # PII detection + masking via Microsoft Presidio. Runs pre_call so prompts
  # are redacted BEFORE reaching the upstream model AND before being written
  # to LiteLLM_SpendLogs — meaning even our own audit log never sees raw PII.
  # default_on=true applies to every request unless a per-key opt-out is set.
  - guardrail_name: "presidio-pii-mask"
    litellm_params:
      guardrail: presidio
      mode: "pre_call"
      default_on: true
      pii_entities_config:
        EMAIL_ADDRESS: "MASK"
        US_SSN: "MASK"
        CREDIT_CARD: "MASK"
        PHONE_NUMBER: "MASK"
        IP_ADDRESS: "MASK"
        US_DRIVER_LICENSE: "MASK"
        US_PASSPORT: "MASK"

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
  # Persist prompts and responses to LiteLLM_SpendLogs (messages/response columns).
  # Audit/compliance feature — disable for privacy-sensitive deployments.
  # Off by default upstream; we opt in here so the audit trail captures content.
  store_prompts_in_spend_logs: true

litellm_settings:
  cache: true
  cache_params:
    type: redis
    host: os.environ/REDIS_HOST
    port: os.environ/REDIS_PORT

  # Defaults applied when a new user is auto-created via SSO first-login.
  default_internal_user_params:
    user_role: "internal_user"
    max_budget: 5.0
    budget_duration: "30d"
    models: ["claude-haiku-4-5", "local-dmr"]

  # Allow internal_user role (not just proxy_admin) to create personal keys.
  # This is the documented knob that controls UI Create-Key button visibility.
  key_generation_settings:
    personal_key_generation:
      allowed_user_roles: ["proxy_admin", "internal_user"]