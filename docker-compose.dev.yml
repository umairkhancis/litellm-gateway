# Local dev override — point LiteLLM's OIDC at the bundled Dex IdP.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml --profile dev up -d
#
# Why an override? Dex on `localhost:5556` resolves differently inside the
# litellm container vs. the browser. The authorization endpoint must be
# browser-reachable (localhost), but the token/userinfo endpoints are
# called server-to-server from LiteLLM and must use docker DNS (dex:5556).

services:
  litellm:
    environment:
      PROXY_BASE_URL: http://localhost:4000
      GENERIC_CLIENT_ID: litellm-gateway
      GENERIC_CLIENT_SECRET: dev-client-secret
      # Browser-facing — LiteLLM redirects the user here.
      GENERIC_AUTHORIZATION_ENDPOINT: http://localhost:5556/auth
      # Server-side — LiteLLM calls these from inside docker.
      GENERIC_TOKEN_ENDPOINT: http://dex:5556/token
      GENERIC_USERINFO_ENDPOINT: http://dex:5556/userinfo
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      dex:
        condition: service_started
