services:
  postgres:
    image: postgres:16
    container_name: litellm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: litellm-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # PII detection + redaction. LiteLLM calls these via docker DNS in pre_call mode,
  # so prompts containing emails/SSNs/etc. are masked before reaching the upstream model.
  # First boot pulls ~500MB of spaCy NLP models — subsequent restarts are fast.
  presidio-analyzer:
    image: mcr.microsoft.com/presidio-analyzer:latest
    container_name: litellm-presidio-analyzer
    restart: unless-stopped

  presidio-anonymizer:
    image: mcr.microsoft.com/presidio-anonymizer:latest
    container_name: litellm-presidio-anonymizer
    restart: unless-stopped

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm-gateway
    restart: unless-stopped
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://litellm:${POSTGRES_PASSWORD}@postgres:5432/litellm
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      STORE_MODEL_IN_DB: "True"
      # Native OIDC SSO for the admin UI. LiteLLM creates user records on
      # first login, scopes virtual keys per user, tracks spend per user.
      # API paths (/v1/*, /chat/*, etc.) remain authenticated by virtual keys.
      PROXY_BASE_URL: ${PROXY_BASE_URL:-}
      GENERIC_CLIENT_ID: ${GENERIC_CLIENT_ID:-}
      GENERIC_CLIENT_SECRET: ${GENERIC_CLIENT_SECRET:-}
      GENERIC_AUTHORIZATION_ENDPOINT: ${GENERIC_AUTHORIZATION_ENDPOINT:-}
      GENERIC_TOKEN_ENDPOINT: ${GENERIC_TOKEN_ENDPOINT:-}
      GENERIC_USERINFO_ENDPOINT: ${GENERIC_USERINFO_ENDPOINT:-}
      # Presidio PII guardrails (Slice 6) — internal docker DNS, no host port mapping needed.
      PRESIDIO_ANALYZER_API_BASE: http://presidio-analyzer:3000
      PRESIDIO_ANONYMIZER_API_BASE: http://presidio-anonymizer:3000
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    extra_hosts:
      - "model-runner.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      presidio-analyzer:
        condition: service_started
      presidio-anonymizer:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4000/health/liveliness').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  dex:
    image: ghcr.io/dexidp/dex:v2.39.1
    container_name: litellm-dex
    restart: unless-stopped
    profiles: ["dev"]
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    ports:
      - "5556:5556"
    volumes:
      - ./dex/config.yaml:/etc/dex/config.yaml:ro

volumes:
  postgres_data:
  redis_data:
