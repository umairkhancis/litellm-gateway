services:
  postgres:
    image: postgres:16
    container_name: litellm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: litellm-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm-gateway
    restart: unless-stopped
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://litellm:${POSTGRES_PASSWORD}@postgres:5432/litellm
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      STORE_MODEL_IN_DB: "True"
      # Native OIDC SSO for the admin UI. LiteLLM creates user records on
      # first login, scopes virtual keys per user, tracks spend per user.
      # API paths (/v1/*, /chat/*, etc.) remain authenticated by virtual keys.
      PROXY_BASE_URL: ${PROXY_BASE_URL:-}
      GENERIC_CLIENT_ID: ${GENERIC_CLIENT_ID:-}
      GENERIC_CLIENT_SECRET: ${GENERIC_CLIENT_SECRET:-}
      GENERIC_AUTHORIZATION_ENDPOINT: ${GENERIC_AUTHORIZATION_ENDPOINT:-}
      GENERIC_TOKEN_ENDPOINT: ${GENERIC_TOKEN_ENDPOINT:-}
      GENERIC_USERINFO_ENDPOINT: ${GENERIC_USERINFO_ENDPOINT:-}
      # Trust mkcert's local CA so server-to-server calls to dex.umairkhancis.test
      # over HTTPS validate. Bundle = curl's public CA list + mkcert root, so
      # public providers (Anthropic, etc.) keep working too.
      SSL_CERT_FILE: /certs/cacert.pem
      REQUESTS_CA_BUNDLE: /certs/cacert.pem
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./certs/cacert.pem:/certs/cacert.pem:ro
    extra_hosts:
      - "model-runner.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      dex:
        condition: service_started
      caddy:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4000/health/liveliness').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  dex:
    image: ghcr.io/dexidp/dex:v2.39.1
    container_name: litellm-dex
    restart: unless-stopped
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    volumes:
      - ./dex/config.yaml:/etc/dex/config.yaml:ro

  # TLS termination + reverse proxy. Network aliases make Caddy resolvable
  # under the public hostnames from inside the docker network too — so the
  # litellm container hits dex.umairkhancis.test (HTTPS) the same way the
  # browser does. No split-horizon, exactly like a real Okta tenant.
  caddy:
    image: caddy:2.10-alpine
    container_name: litellm-caddy
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      dex:
        condition: service_started
    networks:
      default:
        aliases:
          - litellm.umairkhancis.test
          - dex.umairkhancis.test

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
