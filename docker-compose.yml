services:
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm-gateway
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    ports:
      - "4000:4000"
    env_file:
      - .env
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    extra_hosts:
      - "model-runner.docker.internal:host-gateway"
